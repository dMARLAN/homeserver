apiVersion: v1
kind: Secret
metadata:
  name: wedding-frontend-secrets
  namespace: wedding
type: Opaque
stringData:
  # openssl rand -base64 32
  AUTH_SECRET: "change-me"
  ADMIN_PASSWORD: "change-me"
  # Must match ADMIN_AUTH_JWT_SECRET in wedding-api-secrets below.
  ADMIN_AUTH_JWT_SECRET: "change-me"
---
apiVersion: v1
kind: Secret
metadata:
  name: wedding-api-secrets
  namespace: wedding
type: Opaque
stringData:
  ADMIN_AUTH_JWT_SECRET: "change-me"
  DB_PASSWORD: "change-me"
---
apiVersion: v1
kind: Secret
metadata:
  name: wedding-postgres-secrets
  namespace: wedding
type: Opaque
stringData:
  POSTGRES_PASSWORD: "change-me"
