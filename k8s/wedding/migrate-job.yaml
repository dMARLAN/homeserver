apiVersion: batch/v1
kind: Job
metadata:
  name: wedding-migrate
  namespace: wedding
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        app: wedding-migrate
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: docker.io/library/wedding-api:prod
          imagePullPolicy: Never
          workingDir: /app/src/db
          command: ["/app/.venv/bin/alembic", "upgrade", "head"]
          envFrom:
            - configMapRef:
                name: wedding-api-config
            - secretRef:
                name: wedding-api-secrets
